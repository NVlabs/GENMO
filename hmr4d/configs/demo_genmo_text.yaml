defaults:
  - /diffusion@model_cfg.diffusion: ddim
  - model: genmo/genmo_demo
  - endecoder: gvhmr/v1_amass_local_bedlam_cam
  - _self_
multicond_args: null

model_cfg:
  train_modes: ["regression", "diffusion"]
  noisy_2d_obs: true
  kp2d_noise_scale: 0.5
  perframe_condition_exists: true
  train2d_mask_invis_obs: true
  mask_occluded_imgfeats: true
  cond_merge_strategy: "add"
  use_cond_exists_as_input: true
  normalize_cam_angvel: true

  diffusion:
    test_timestep_respacing: "50"
    guidance_param: 2.5

  text_encoder:
    load_llm: true
    llm_version: "t5-3b"
    max_text_len: 50

  condition_mask:
    mask_img_prob: 1.0
    mask_cam_prob: 1.0
    reuse_regression_mask: false
    regression_no_img_mask: true

  mask_cfg:
    drop_prob: 0.75
    max_num_drops: 3
    min_drop_nframes: 1
    max_drop_nframes: 30
  body_mask_cfg:
    drop_prob: 0.75
    joint_drop_prob: 0.25
    max_num_drops: 3
    min_drop_nframes: 1
    max_drop_nframes: 30
  music_mask_prob: 0.1
  audio_mask_prob: 0.1

pipeline:
  _target_: hmr4d.model.genmo.genmo_pipeline.Pipeline
  args_denoiser3d: ${network}
  args:
    endecoder_opt: ${endecoder}
    use_regression_outputs_prob: 0.
    use_cfg_sampler_for_gen: true
    inpaint_x_start_gt: false
    infer_version: 2
    encoded_music_dim: 4800
    multicond_args: ${multicond_args}
    weights:
      cr_j3d: 500.
      transl_c: 1.
      cr_verts: 500.
      j2d: 1000.
      verts2d: 1000.

      j2d_train2d: 1000.
      proj_gt_j2d_to_bi01: true
      # norm_j2d: 1000.

      transl_w: 1.
      static_conf_bce: 1.

    static_conf:
      vel_thr: 0.15

    in_attr:
      - obs
      - f_cliffcam
      - f_imgseq
      - f_cam_angvel
      - encoded_music
      - encoded_audio
    mask_out_attr: [] # ${.in_attr}
    out_attr:
      pred_cam: 3

network:
  _target_: hmr4d.network.genmo.genmo_diffusion.GENMODiffusion
  args: ${pipeline.args}
  latent_dim: ${.model_cfg.denoiser.latent_dim}
  cond_merge_strategy: "add"
  music_mask_prob: ${.model_cfg.denoiser.music_mask_prob}
  speech_mask_prob: ${.model_cfg.denoiser.speech_mask_prob}
  encoded_music_dim: ${pipeline.args.encoded_music_dim}
  model_cfg:
    diffusion: ${model_cfg.diffusion}
    denoiser:
      _target_: hmr4d.network.genmo.genmo_denoiser.NetworkEncoderRoPE
      output_dim: 151
      xt_dim: ${.output_dim}
      njoints: ${.xt_dim}
      text_mask_prob: 0.1
      music_mask_prob: 0.1
      speech_mask_prob: 0.1
      use_text_pos_enc: true
      text_encoder_cfg:
        mode: all
        cross_attn_type: mha
      latent_dim: 1024
      num_layers: 16
      num_heads: 8
      mlp_ratio: 4

ckpt_path: outputs/mocap_mixed_v1/genmo/genmo_lg_jukebox_jukebox_new/version_0/checkpoints/last.ckpt
remote_results_path: /lustre/fsw/portfolios/nvr/projects/nvr_torontoai_humanmotionfm/workspaces/motiondiff/motiondiff_results/jiefengl/gvhmr

# ================================ #
#          global setting          #
