# definition of lightning datamodule (dataset + dataloader)
_target_: hmr4d.datamodule.mocap_trainX_testY_with2D.DataModule

dataset_opts:
  train: ${train_datasets}
  train_2d: ${train_2d_datasets}
  val: ${test_datasets}
  max_motion_frames: 120

loader_opts:
  train:
    batch_size: 32
    num_workers: 8
  val:
    batch_size: 1
    num_workers: 1

limit_each_trainset: null

collate_cfg:
  default_feature_dim:
    humanoid_obs:
      - ${....dataset_opts.max_motion_frames}
      - 358
    humanoid_clean_action:
      - ${....dataset_opts.max_motion_frames}
      - 69
    text_embed: [50, 1024]
