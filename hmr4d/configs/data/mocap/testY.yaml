# definition of lightning datamodule (dataset + dataloader)
_target_: hmr4d.datamodule.mocap_trainX_testY.DataModule

dataset_opts:
  test: ${test_datasets}
  max_motion_frames: 120

loader_opts:
  test:
    batch_size: 1
    num_workers: 4

collate_cfg:
  default_feature_dim:
    humanoid_obs:
      - ${....dataset_opts.max_motion_frames}
      - 358
    humanoid_clean_action:
      - ${....dataset_opts.max_motion_frames}
      - 69
    text_embed: [50, 1024]
