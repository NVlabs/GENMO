# @package _global_
defaults:
  - override /data: mocap/testY
  - override /test_datasets:
      - humanml3d_test
      # - rich/all
      # - emdb1/v1_fliptest
      # - emdb2/v1_fliptest
      # - 3dpw/fliptest
  - override /callbacks:
      - vis_text
      # - metric_emdb1
      # - metric_emdb2
      # - metric_3dpw
  - _self_

text_feats_dir: 'text_feats'
text_data_name: 'humanml3d'
part_ind: -1
num_parts: -1
trial_ind: 0

test_datasets:
  humanml3d_test:
    part_ind: ${part_ind}
    num_parts: ${num_parts}

pipeline:
  args:
    test_motion_len: 196

callbacks:
  vis_text:
    save_feats: true
    dataset_part_ind: ${part_ind}
    trial_ind: ${trial_ind}
    text_len: ${pipeline.args.test_motion_len}
    endecoder:
      _target_: hmr4d.model.gvhmr.utils.endecoder.EnDecoder
      stats_name: 'DEFAULT_01'
      encode_type: 'humanml3d'
    save_dir: ${output_dir}/${text_feats_dir}_${text_data_name}

seed: ${trial_ind}

task: test
# remote_results_path: /lustre/fsw/portfolios/nvr/projects/nvr_torontoai_humanmotionfm/workspaces/motiondiff/motiondiff_results/yey/gvhmr
remote_results_path: /lustre/fsw/portfolios/nvr/projects/nvr_torontoai_humanmotionfm/workspaces/motiondiff/motiondiff_results/jiefengl/gvhmr
ckpt_path: ??? # will not override previous setting if already set

# lightning utilities
pl_trainer:
  devices: 1

logger:
    _target_: pytorch_lightning.loggers.WandbLogger
    project: 'mfm-hmr-test'
    entity: 'nvr-lpr'
    save_dir: "/tmp" # /save_dir/name/version/sub_dir
    name: ""
    version: ""
    resume: 'allow'
    dir: "/tmp"
    id: null
